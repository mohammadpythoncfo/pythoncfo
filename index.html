document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ly:'IBM Plex Mono',monospace; font-size:13px; color:var(--gray-dim); padding-top:3px;\">01<\u002Fspan>\n        <div style=\"flex:1;\">\n          <div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:12px; flex-wrap:wrap; margin-bottom:8px;\"><span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--purple-light); letter-spacing:1.2px;\">REVENUE INFRASTRUCTURE<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--green); font-weight:500;\">real-time<\u002Fspan><\u002Fdiv>\n          <h3 style=\"font-family:'Sora',sans-serif; font-size:19px; font-weight:600; margin-bottom:8px; color:var(--white);\">Dashboards From Raw Billing Data<\u002Fh3>\n          <p style=\"font-size:13.5px; color:var(--gray-light); line-height:1.65;\">Production dashboards built straight from raw billing data in Python and SQL: automated revenue recognition and live subscription analytics, current to the day.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fa>\n      <a tabindex=\"0\" style=\"display:flex; gap:18px; padding:24px 22px; border:1px solid var(--border-soft); border-left:2px solid var(--border); border-radius:8px; margin-bottom:12px; text-decoration:none; cursor:pointer;\" style-hover=\"background:rgba(124,58,237,.06); border-left-color:var(--green);\">\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--gray-dim); padding-top:3px;\">02<\u002Fspan>\n        <div style=\"flex:1;\">\n          <div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:12px; flex-wrap:wrap; margin-bottom:8px;\"><span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--purple-light); letter-spacing:1.2px;\">AUTOMATION<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--green); font-weight:500;\">books revenue day 1<\u002Fspan><\u002Fdiv>\n          <h3 style=\"font-family:'Sora',sans-serif; font-size:19px; font-weight:600; margin-bottom:8px; color:var(--white);\">20-Step Automated Close<\u002Fh3>\n          <p style=\"font-size:13.5px; color:var(--gray-light); line-height:1.65;\">A month-end close engineered in Python that books revenue on day one: 20 steps from reconciliation through accrual entries. Days of manual work compressed into hours.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fa>\n      <a tabindex=\"0\" style=\"display:flex; gap:18px; padding:24px 22px; border:1px solid var(--border-soft); border-left:2px solid var(--border); border-radius:8px; margin-bottom:12px; text-decoration:none; cursor:pointer;\" style-hover=\"background:rgba(124,58,237,.06); border-left-color:var(--green);\">\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--gray-dim); padding-top:3px;\">03<\u002Fspan>\n        <div style=\"flex:1;\">\n          <div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:12px; flex-wrap:wrap; margin-bottom:8px;\"><span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--purple-light); letter-spacing:1.2px;\">ANALYTICS ENGINE<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--green); font-weight:500;\">quarterly<\u002Fspan><\u002Fdiv>\n          <h3 style=\"font-family:'Sora',sans-serif; font-size:19px; font-weight:600; margin-bottom:8px; color:var(--white);\">SaaS Metrics &amp; Board Packages<\u002Fh3>\n          <p style=\"font-size:13.5px; color:var(--gray-light); line-height:1.65;\">End-to-end pipelines in Python and SQL (ARR, NRR, GDR, churn, margin, runway) feeding the quarterly board packages I present to institutional boards.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fa>\n      <a tabindex=\"0\" style=\"display:flex; gap:18px; padding:24px 22px; border:1px solid var(--border-soft); border-left:2px solid var(--border); border-radius:8px; text-decoration:none; cursor:pointer;\" style-hover=\"background:rgba(124,58,237,.06); border-left-color:var(--green);\">\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--gray-dim); padding-top:3px;\">04<\u002Fspan>\n        <div style=\"flex:1;\">\n          <div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:12px; flex-wrap:wrap; margin-bottom:8px;\"><span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--purple-light); letter-spacing:1.2px;\">TRANSFORMATION<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--green); font-weight:500;\">~4x ARR · NRR &gt;100%<\u002Fspan><\u002Fdiv>\n          <h3 style=\"font-family:'Sora',sans-serif; font-size:19px; font-weight:600; margin-bottom:8px; color:var(--white);\">YC-Backed Finance Turnaround<\u002Fh3>\n          <p style=\"font-size:13.5px; color:var(--gray-light); line-height:1.65;\">Ran finance for a YC-backed B2B vertical SaaS company through ~4x ARR growth: led the cash-to-accrual conversion, supported the Series B, and built the metrics behind net revenue retention crossing 100% and gross monthly churn roughly halved.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fa>\n    <\u002Fsection>\n\n    <hr style=\"height:1px; border:none; background:linear-gradient(90deg,transparent,var(--border),transparent); max-width:940px; margin:0 auto;\">\n\n    <section style=\"max-width:940px; margin:0 auto; padding:72px 24px;\">\n      <div style=\"display:flex; gap:48px; flex-wrap:wrap; align-items:flex-start;\">\n        <div style=\"flex:1 1 340px;\">\n          <p style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--green); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:12px;\"><span style=\"color:var(--green-light);\">&gt;<\u002Fspan> About<\u002Fp>\n          <h2 style=\"font-family:'Sora',sans-serif; font-size:27px; font-weight:700; letter-spacing:-.5px; line-height:1.25; margin-bottom:22px;\">Finance PhD dropout.<br><spa
